spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/dosw_library
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

jwt:
  secret: dG9kb3NMb3NTZWNyZXRvc1NvbkJhc2U2NEVuY29kZWRLZXlGb3JKV1QyMDI1
  expiration: 86400000

server:
  port: 8443
  ssl:
    key-store: classpath:keystore.p12
    key-store-password: changeit
    key-store-type: PKCS12
    key-alias: dosw-library

spring:
  data:
    mongodb:
      uri: mongodb+srv://<usuario>:<password>@<cluster>.mongodb.net/dosw_library
      database: dosw_library
